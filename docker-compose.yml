version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: craneinspect_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DB_HOST=db
      - DB_USER=${DB_USER:-craneadmin}
      - DB_PASSWORD=${DB_PASSWORD:-cranepassword}
      - DB_NAME=${DB_NAME:-craneinspect_db}
      - DB_PORT=5432
      # Credenciais AWS — Em produção, resolvidas pela IAM Role da EC2 (sem hardcode)
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-}
      - PRESIGNED_URL_EXPIRATION=${PRESIGNED_URL_EXPIRATION:-3600}
    depends_on:
      db:
        condition: service_healthy


  db:
    image: postgres:15-alpine
    container_name: craneinspect_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${DB_USER:-craneadmin}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-cranepassword}
      - POSTGRES_DB=${DB_NAME:-craneinspect_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-craneadmin} -d ${DB_NAME:-craneinspect_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
