<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CraneInspect — Sistema de Inspeção de Equipamentos</title>
  <meta name="description" content="Plataforma de gestão digital de inspeções técnicas para gruas e equipamentos de grande porte." />

  <!-- =============================================
       ZERO-BUILD STACK (ADR-000)
       PROIBIDO: npm, yarn, webpack, vite, react.
       PERMITIDO: CDN único para jQuery e Bootstrap.
       ============================================= -->

  <!-- Bootstrap 5 CSS via CDN -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* =============================================
       DESIGN SYSTEM CUSTOMIZADO — SOBRE O BOOTSTRAP
       Tema: Dark Industrial / CraneInspect
       ============================================= */
    :root {
      --ci-dark:       #0a0f1e;
      --ci-surface:    #111827;
      --ci-card:       #1a2235;
      --ci-border:     rgba(255,255,255,0.09);
      --ci-accent:     #4f9cf9;
      --ci-accent-dim: rgba(79,156,249,0.15);
      --ci-success:    #34d399;
      --ci-warning:    #fbbf24;
      --ci-danger:     #f87171;
      --ci-text:       #e2e8f0;
      --ci-muted:      #64748b;
      --ci-radius:     0.75rem;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--ci-dark);
      color: var(--ci-text);
      min-height: 100vh;
    }

    /* Mesh gradient de fundo */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 50% at 15% 10%, rgba(79,156,249,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 85% 85%, rgba(139,92,246,0.08) 0%, transparent 55%);
    }

    /* ---- NAVBAR ---- */
    .navbar { background: rgba(10,15,30,0.85) !important; backdrop-filter: blur(20px); border-bottom: 1px solid var(--ci-border); }
    .navbar-brand { font-weight: 700; font-size: 1.1rem; color: var(--ci-text) !important; letter-spacing: -0.3px; }
    .navbar-brand .brand-icon { background: linear-gradient(135deg, #4f9cf9, #8b5cf6); border-radius: 8px; padding: 4px 8px; margin-right: 8px; }
    .api-badge { font-size: 0.72rem; padding: 4px 12px; border-radius: 999px; border: 1px solid rgba(52,211,153,0.3); background: rgba(52,211,153,0.08); color: var(--ci-success); }
    .api-badge .dot { display: inline-block; width: 7px; height: 7px; background: var(--ci-success); border-radius: 50%; margin-right: 5px; animation: pulse 2s infinite; }

    /* ---- CARDS ---- */
    .ci-card { background: var(--ci-card); border: 1px solid var(--ci-border); border-radius: var(--ci-radius); }
    .ci-card .card-header { background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--ci-border); font-weight: 600; font-size: 0.85rem; color: var(--ci-muted); text-transform: uppercase; letter-spacing: 0.6px; padding: 14px 20px; }

    /* ---- FORM CONTROLS (override Bootstrap para tema dark) ---- */
    .form-control, .form-select {
      background-color: rgba(255,255,255,0.04) !important;
      border: 1px solid var(--ci-border) !important;
      color: var(--ci-text) !important;
      border-radius: 8px !important;
      font-size: 0.875rem;
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--ci-accent) !important;
      box-shadow: 0 0 0 3px rgba(79,156,249,0.18) !important;
    }
    .form-control::placeholder { color: var(--ci-muted) !important; }
    .form-label { font-size: 0.75rem; font-weight: 600; color: var(--ci-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .form-select option { background: #1e293b; }

    /* ---- BOTÕES ---- */
    .btn-ci-primary {
      background: linear-gradient(135deg, #4f9cf9, #6366f1);
      border: none; color: #fff; font-weight: 600; font-size: 0.875rem;
      border-radius: 8px; padding: 10px 22px;
      box-shadow: 0 4px 14px rgba(79,156,249,0.28);
      transition: all 0.2s ease;
    }
    .btn-ci-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(79,156,249,0.42); color: #fff; }
    .btn-ci-primary:disabled { opacity: 0.55; transform: none; }
    .btn-ci-outline { background: transparent; border: 1px solid var(--ci-border); color: var(--ci-muted); border-radius: 8px; font-size: 0.875rem; padding: 7px 16px; transition: all 0.2s; }
    .btn-ci-outline:hover { border-color: var(--ci-accent); color: var(--ci-accent); }

    /* ---- LISTA DE INSPEÇÕES ---- */
    .inspection-item {
      background: var(--ci-card); border: 1px solid var(--ci-border);
      border-radius: 10px; padding: 16px 20px;
      cursor: pointer; transition: all 0.2s ease;
      margin-bottom: 10px;
    }
    .inspection-item:hover { border-color: rgba(79,156,249,0.45); background: rgba(79,156,249,0.06); transform: translateX(4px); }
    .inspection-tag { font-weight: 700; font-size: 0.95rem; }
    .inspection-tag .id-badge { color: var(--ci-accent); }
    .inspection-meta { font-size: 0.76rem; color: var(--ci-muted); margin-top: 4px; }

    /* ---- STATUS BADGES ---- */
    .badge-PENDING  { background: rgba(251,191,36,0.12);  color: var(--ci-warning); border: 1px solid rgba(251,191,36,0.28);  font-size: 0.68rem; padding: 3px 10px; border-radius: 999px; font-weight: 700; text-transform: uppercase; }
    .badge-APPROVED { background: rgba(52,211,153,0.12);  color: var(--ci-success); border: 1px solid rgba(52,211,153,0.28);  font-size: 0.68rem; padding: 3px 10px; border-radius: 999px; font-weight: 700; text-transform: uppercase; }
    .badge-REJECTED { background: rgba(248,113,113,0.12); color: var(--ci-danger);  border: 1px solid rgba(248,113,113,0.28); font-size: 0.68rem; padding: 3px 10px; border-radius: 999px; font-weight: 700; text-transform: uppercase; }

    /* ---- MODAL (override Bootstrap dark) ---- */
    .modal-content { background: #111827; border: 1px solid var(--ci-border); border-radius: 16px; color: var(--ci-text); }
    .modal-header { border-bottom: 1px solid var(--ci-border); }
    .modal-footer { border-top: 1px solid var(--ci-border); }
    .modal-title { font-weight: 700; font-size: 1rem; }
    .btn-close { filter: invert(1) brightness(0.6); }

    /* ---- UPLOAD ZONE ---- */
    .upload-zone {
      border: 2px dashed var(--ci-border); border-radius: 10px;
      padding: 28px; text-align: center; cursor: pointer;
      transition: all 0.2s;
    }
    .upload-zone:hover, .upload-zone.drag-over { border-color: var(--ci-accent); background: var(--ci-accent-dim); }
    .upload-zone .icon { font-size: 2rem; margin-bottom: 8px; }
    .upload-zone p { font-size: 0.82rem; color: var(--ci-muted); margin: 0; }

    /* ---- DETAIL GRID ---- */
    .detail-label { font-size: 0.68rem; font-weight: 600; color: var(--ci-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
    .detail-value { font-size: 0.875rem; margin-bottom: 14px; }

    /* ---- EMPTY STATE ---- */
    .empty-state { padding: 48px; text-align: center; color: var(--ci-muted); }
    .empty-state .icon { font-size: 2.5rem; opacity: 0.5; margin-bottom: 12px; }

    /* ---- SECTION TITLE ---- */
    .section-title { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.2px; }
    .section-title span { color: var(--ci-accent); }

    /* ---- TOAST (Bootstrap custom) ---- */
    #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 1090; }
    .ci-toast { min-width: 280px; max-width: 360px; border-radius: 10px; font-size: 0.82rem; font-weight: 500; backdrop-filter: blur(16px); border: 1px solid; }
    .ci-toast-success { background: rgba(52,211,153,0.15); border-color: rgba(52,211,153,0.3); color: var(--ci-success); }
    .ci-toast-error   { background: rgba(248,113,113,0.15); border-color: rgba(248,113,113,0.3); color: var(--ci-danger); }
    .ci-toast-info    { background: rgba(79,156,249,0.15);  border-color: rgba(79,156,249,0.3);  color: var(--ci-accent); }

    /* ---- SPINNER ---- */
    .spinner-sm { width: 14px; height: 14px; border-width: 2px; }

    /* ---- ANIMATIONS ---- */
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation: fadeUp 0.3s ease forwards; }
  </style>
</head>

<body>
<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container-fluid px-4">
    <a class="navbar-brand d-flex align-items-center" href="#">
      <span class="brand-icon me-2">🏗️</span>
      <div>
        <div>CraneInspect</div>
        <div style="font-size:0.65rem; color:var(--ci-muted); font-weight:400; line-height:1">Sistema de Inspeção Técnica</div>
      </div>
    </a>
    <span class="api-badge ms-auto" id="api-status-badge">
      <span class="dot"></span>
      <span id="api-status-text">Verificando API…</span>
    </span>
  </div>
</nav>

<!-- CONTEÚDO PRINCIPAL -->
<div class="container-fluid px-4 py-4" style="position:relative;z-index:1;max-width:1280px;margin:0 auto;">
  <div class="row g-4">

    <!-- COLUNA ESQUERDA: FORMULÁRIO -->
    <div class="col-12 col-lg-5">
      <div class="ci-card">
        <div class="card-header">
          <span class="section-title">Nova <span>Vistoria</span></span>
        </div>
        <div class="p-4">
          <form id="form-inspecao">

            <div class="mb-3">
              <label class="form-label" for="crane_tag">Tag / Chassi da Grua</label>
              <input id="crane_tag" type="text" class="form-control" placeholder="Ex: GRU-9092" required />
            </div>

            <div class="mb-3">
              <label class="form-label" for="inspector_name">Inspetor Responsável</label>
              <input id="inspector_name" type="text" class="form-control" placeholder="Ex: Eng. Rodolfo Martins" required />
            </div>

            <div class="mb-3">
              <label class="form-label" for="status">Status Inicial</label>
              <select id="status" class="form-select">
                <option value="PENDING">⏳ Pendente</option>
                <option value="APPROVED">✅ Aprovado</option>
                <option value="REJECTED">❌ Rejeitado</option>
              </select>
            </div>

            <div class="mb-4">
              <label class="form-label" for="notes">Observações Técnicas</label>
              <textarea id="notes" class="form-control" rows="3" placeholder="Descreva as condições de inspeção, anomalias encontradas…"></textarea>
            </div>

            <button id="btn-submit" type="submit" class="btn btn-ci-primary w-100">
              <span id="btn-content">＋ &nbsp;Registrar Vistoria</span>
            </button>

          </form>
        </div>
      </div>
    </div>

    <!-- COLUNA DIREITA: LISTA -->
    <div class="col-12 col-lg-7">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <div class="section-title">Vistorias <span>Registradas</span></div>
        <button class="btn btn-ci-outline" id="btn-refresh">↻ Atualizar</button>
      </div>
      <div id="inspection-list-container">
        <div class="empty-state"><div class="icon">⏳</div><p>Carregando vistorias…</p></div>
      </div>
    </div>

  </div>
</div>

<!-- =============================================
     MODAL DE DETALHE DA VISTORIA
     ============================================= -->
<div class="modal fade" id="modalDetalhe" tabindex="-1" aria-labelledby="modalDetalheLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header px-4 pt-4">
        <h5 class="modal-title" id="modalDetalheLabel">Detalhe da Vistoria</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>
      <div class="modal-body px-4" id="modal-body-content"></div>
      <div class="modal-footer px-4 pb-4 flex-column align-items-stretch gap-2">
        <div style="font-size:0.8rem; font-weight:600; color:var(--ci-muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px;">📸 Evidências Fotográficas</div>
        <div class="upload-zone" id="upload-zone">
          <div class="icon">☁️</div>
          <p><strong>Clique para enviar</strong> ou arraste uma imagem</p>
          <p style="font-size:0.7rem; margin-top:4px;">JPEG · PNG · WebP — Upload direto para S3 privado</p>
          <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" style="display:none" />
        </div>
        <div id="upload-status" style="font-size:0.8rem; color:var(--ci-muted); min-height:18px;"></div>
        <div id="photo-grid" class="row g-2 mt-1"></div>
      </div>
    </div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div id="toast-container"></div>

<!-- =============================================
     SCRIPTS — CDN APENAS (ADR-000)
     PROIBIDO: npm, yarn, webpack, vite, react
     ============================================= -->

<!-- jQuery 3.7 via CDN -->
<script
  src="https://code.jquery.com/jquery-3.7.1.min.js"
  integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
  crossorigin="anonymous">
</script>

<!-- Bootstrap 5 JS via CDN -->
<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmSWxE21pzRRtaGnT8fnm0TzxiR"
  crossorigin="anonymous">
</script>

<script>
/* ============================================================
   CRANEINSPECT — ZERO-BUILD FRONTEND ENGINE
   Stack: jQuery 3.7 + Bootstrap 5 via CDN (ADR-000)
   PROIBIDO: npm / yarn / webpack / vite / react / vue / angular
   ============================================================ */

  const API_BASE = 'http://localhost:8000';
  let activeInspectionId = null;
  const modalDetalhe = new bootstrap.Modal($('#modalDetalhe')[0]);

  /* ---- UTILITÁRIOS ---- */

  function showToast(message, type = 'info') {
    const icons = { success: '✓', error: '✗', info: 'ℹ' };
    const $toast = $(`
      <div class="ci-toast ci-toast-${type} d-flex align-items-center gap-2 p-3 mb-2">
        <span>${icons[type]}</span><span>${message}</span>
      </div>
    `).hide();
    $('#toast-container').append($toast);
    $toast.fadeIn(200);
    setTimeout(() => $toast.fadeOut(300, function () { $(this).remove(); }), 3800);
  }

  function formatDate(iso) {
    return new Date(iso).toLocaleString('pt-BR', {
      day: '2-digit', month: '2-digit', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  function statusBadge(status) {
    return `<span class="badge-${status}">${status}</span>`;
  }

  /* ---- STATUS DA API ---- */

  function checkApiStatus() {
    $.get(`${API_BASE}/health`)
      .done(function () {
        $('#api-status-text').text('API Online');
        $('#api-status-badge').css('color', 'var(--ci-success)');
        $('#api-status-badge .dot').css('background', 'var(--ci-success)');
      })
      .fail(function () {
        $('#api-status-text').text('API Offline');
        $('#api-status-badge').css({ color: 'var(--ci-danger)', borderColor: 'rgba(248,113,113,0.3)' });
        $('#api-status-badge .dot').css('background', 'var(--ci-danger)');
      });
  }

  /* ---- CARREGAR LISTA DE INSPEÇÕES ---- */

  function loadInspections() {
    $('#inspection-list-container').html(`
      <div class="empty-state"><div class="icon">⏳</div><p>Carregando…</p></div>
    `);

    $.getJSON(`${API_BASE}/inspections`)
      .done(function (data) {
        if (!data.length) {
          $('#inspection-list-container').html(`
            <div class="empty-state">
              <div class="icon">🏗️</div>
              <p>Nenhuma vistoria registrada.<br>Crie a primeira no formulário ao lado.</p>
            </div>`);
          return;
        }

        let html = '';
        $.each(data.reverse(), function (_, ins) {
          html += `
            <div class="inspection-item fade-up" data-id="${ins.id}" data-obj='${JSON.stringify(ins).replace(/'/g, "&#39;")}'>
              <div class="d-flex align-items-center justify-content-between">
                <div>
                  <div class="inspection-tag">🏗️ <span class="id-badge">#${ins.id}</span> — ${ins.crane_tag}</div>
                  <div class="inspection-meta">
                    👷 ${ins.inspector_name} &nbsp;·&nbsp;
                    📅 ${formatDate(ins.inspection_date)} &nbsp;·&nbsp;
                    📸 ${ins.photos.length} foto(s)
                  </div>
                </div>
                ${statusBadge(ins.status)}
              </div>
            </div>`;
        });

        $('#inspection-list-container').html(html);

        /* Bind click via jQuery event delegation */
        $('#inspection-list-container').on('click', '.inspection-item', function () {
          const ins = JSON.parse($(this).attr('data-obj').replace(/&#39;/g, "'"));
          openModal(ins);
        });
      })
      .fail(function (jqXHR) {
        $('#inspection-list-container').html(`
          <div class="empty-state">
            <div class="icon">⚠️</div>
            <p>Erro ao conectar à API.<br><small>${jqXHR.statusText || 'Network Error'}</small></p>
          </div>`);
      });
  }

  /* ---- CRIAR INSPEÇÃO ---- */

  $('#form-inspecao').on('submit', function (e) {
    e.preventDefault();

    const payload = {
      crane_tag:      $('#crane_tag').val().trim(),
      inspector_name: $('#inspector_name').val().trim(),
      status:         $('#status').val(),
      notes:          $('#notes').val().trim() || null,
    };

    $('#btn-submit').prop('disabled', true);
    $('#btn-content').html('<span class="spinner-border spinner-sm me-2" role="status"></span>Registrando…');

    $.ajax({
      url:         `${API_BASE}/inspections`,
      method:      'POST',
      contentType: 'application/json',
      data:        JSON.stringify(payload),
    })
    .done(function () {
      showToast(`Vistoria "${payload.crane_tag}" registrada com sucesso!`, 'success');
      $('#form-inspecao')[0].reset();
      loadInspections();
    })
    .fail(function (jqXHR) {
      showToast(`Falha ao registrar: HTTP ${jqXHR.status}`, 'error');
    })
    .always(function () {
      $('#btn-submit').prop('disabled', false);
      $('#btn-content').html('＋ &nbsp;Registrar Vistoria');
    });
  });

  /* ---- ABRIR MODAL ---- */

  function openModal(ins) {
    activeInspectionId = ins.id;
    $('#modalDetalheLabel').text(`#${ins.id} — ${ins.crane_tag}`);
    $('#upload-status').text('');
    $('#photo-grid').empty();

    let body = `
      <div class="row">
        <div class="col-6">
          <div class="detail-label">Tag / Chassi</div>
          <div class="detail-value">${ins.crane_tag}</div>
        </div>
        <div class="col-6">
          <div class="detail-label">Status</div>
          <div class="detail-value">${statusBadge(ins.status)}</div>
        </div>
        <div class="col-6">
          <div class="detail-label">Inspetor</div>
          <div class="detail-value">${ins.inspector_name}</div>
        </div>
        <div class="col-6">
          <div class="detail-label">Data da Vistoria</div>
          <div class="detail-value">${formatDate(ins.inspection_date)}</div>
        </div>
        ${ins.notes ? `<div class="col-12"><div class="detail-label">Observações</div><div class="detail-value" style="line-height:1.6">${ins.notes}</div></div>` : ''}
      </div>`;

    $('#modal-body-content').html(body);

    /* Popula grid de fotos */
    if (ins.photos && ins.photos.length) {
      $.each(ins.photos, function (_, photo) {
        $('#photo-grid').append(`
          <div class="col-4">
            <div class="ci-card d-flex align-items-center justify-content-center" style="aspect-ratio:1;font-size:1.8rem;cursor:default;" title="${photo.s3_object_key}">
              📷<div style="font-size:0.6rem;position:absolute;bottom:4px;color:var(--ci-muted)">ID: ${photo.id}</div>
            </div>
          </div>`);
      });
    }

    modalDetalhe.show();
  }

  /* ---- UPLOAD DE FOTO ---- */

  $('#upload-zone').on('click', function () { $('#file-input').trigger('click'); });

  $('#file-input').on('change', function () {
    const file = this.files[0];
    if (!file || !activeInspectionId) return;
    uploadPhoto(file);
    this.value = '';
  });

  /* Drag & Drop */
  $('#upload-zone')
    .on('dragover', function (e) { e.preventDefault(); $(this).addClass('drag-over'); })
    .on('dragleave', function ()  { $(this).removeClass('drag-over'); })
    .on('drop', function (e) {
      e.preventDefault();
      $(this).removeClass('drag-over');
      const file = e.originalEvent.dataTransfer.files[0];
      if (file) uploadPhoto(file);
    });

  function uploadPhoto(file) {
    const $status = $('#upload-status');
    $status.html('<span class="spinner-border spinner-sm me-2" role="status"></span> Enviando para S3…');

    const formData = new FormData();
    formData.append('file', file);
    formData.append('description', file.name);

    $.ajax({
      url:         `${API_BASE}/inspections/${activeInspectionId}/photos`,
      method:      'POST',
      data:        formData,
      processData: false,
      contentType: false,
    })
    .done(function (photo) {
      showToast('Foto registrada com sucesso!', 'success');
      $status.text(`✓ Foto ID #${photo.id} registrada.`);
      $('#photo-grid').append(`
        <div class="col-4 fade-up">
          <div class="ci-card d-flex align-items-center justify-content-center" style="aspect-ratio:1;font-size:1.8rem;" title="${photo.s3_object_key}">
            📷<div style="font-size:0.6rem;position:absolute;bottom:4px;color:var(--ci-muted)">ID: ${photo.id}</div>
          </div>
        </div>`);
    })
    .fail(function (jqXHR) {
      const detail = jqXHR.responseJSON ? jqXHR.responseJSON.detail : `HTTP ${jqXHR.status}`;
      if (jqXHR.status === 500) {
        /* S3 não configurado — comportamento esperado sem bucket */
        showToast('S3 não configurado (aguardando Terraform)', 'info');
        $status.html('⚠️ S3 ainda não provisionado via Terraform.');
      } else {
        showToast(`Falha no upload: ${detail}`, 'error');
        $status.text(`✗ ${detail}`);
      }
    });
  }

  /* ---- BOOTSTRAP da Aplicação (jQuery Document Ready) ---- */

  $(function () {
    checkApiStatus();
    loadInspections();
    $('#btn-refresh').on('click', loadInspections);
  });

</script>
</body>
</html>
