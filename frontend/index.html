<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CraneInspect — Sistema de Inspeção de Equipamentos</title>
  <meta name="description" content="Plataforma de gestão digital de inspeções técnicas para gruas e equipamentos de grande porte." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* =============================================
       DESIGN SYSTEM — CRANEINSPECT ZERO-BUILD UI
       ============================================= */
    :root {
      --bg-base:       #0a0f1e;
      --bg-surface:    rgba(255,255,255,0.04);
      --bg-card:       rgba(255,255,255,0.065);
      --border:        rgba(255,255,255,0.10);
      --border-focus:  rgba(99,179,237,0.55);
      --accent:        #4f9cf9;
      --accent-glow:   rgba(79,156,249,0.20);
      --accent-hover:  #3b82f6;
      --success:       #34d399;
      --warning:       #fbbf24;
      --danger:        #f87171;
      --text-primary:  #e2e8f0;
      --text-secondary:#94a3b8;
      --text-muted:    #475569;
      --radius-sm:     8px;
      --radius-md:     14px;
      --radius-lg:     22px;
      --transition:    all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* -- Gradient mesh background -- */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(79,156,249,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 85% 80%, rgba(139,92,246,0.10) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    /* ---- LAYOUT ---- */
    .app-wrapper { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; }

    /* ---- HEADER ---- */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 40px;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
      background: rgba(10,15,30,0.75);
      position: sticky; top: 0; z-index: 50;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, #4f9cf9, #8b5cf6);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text { font-size: 18px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.3px; }
    .logo-sub { font-size: 11px; color: var(--text-secondary); font-weight: 400; }
    .header-badge {
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; color: var(--success);
      background: rgba(52,211,153,0.10);
      border: 1px solid rgba(52,211,153,0.25);
      border-radius: 999px; padding: 5px 14px;
    }
    .badge-dot { width: 7px; height: 7px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }

    /* ---- MAIN CONTENT ---- */
    main { flex: 1; max-width: 1200px; margin: 0 auto; padding: 40px 24px; width: 100%; }

    /* ---- SECTION HEADER ---- */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px;
    }
    .section-title { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
    .section-title span { color: var(--accent); }

    /* ---- CARDS ---- */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
      backdrop-filter: blur(16px);
      transition: var(--transition);
    }
    .card:hover { border-color: rgba(255,255,255,0.16); }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

    /* ---- FORM ELEMENTS ---- */
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }

    input[type="text"], textarea, select {
      width: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 11px 15px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: var(--transition);
    }
    input[type="text"]:focus, textarea:focus, select:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    textarea { resize: vertical; min-height: 80px; }
    select option { background: #1e293b; }

    /* ---- BUTTONS ---- */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 22px; border: none; border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: var(--transition); text-decoration: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #6366f1);
      color: #fff;
      box-shadow: 0 4px 14px rgba(79,156,249,0.30);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(79,156,249,0.45); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-ghost {
      background: var(--bg-surface); border: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .btn-ghost:hover { border-color: var(--border-focus); color: var(--text-primary); }

    /* ---- INSPECTION LIST ---- */
    .inspection-list { display: flex; flex-direction: column; gap: 14px; }

    .inspection-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 20px 24px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer;
      transition: var(--transition);
    }
    .inspection-card:hover {
      border-color: var(--border-focus);
      background: rgba(79,156,249,0.07);
      transform: translateX(4px);
    }
    .inspection-info { display: flex; flex-direction: column; gap: 5px; }
    .inspection-tag {
      font-size: 16px; font-weight: 700; letter-spacing: -0.2px;
      color: var(--text-primary);
    }
    .inspection-tag strong { color: var(--accent); }
    .inspection-meta { font-size: 12px; color: var(--text-secondary); display: flex; gap: 14px; }
    .inspection-meta svg { vertical-align: middle; }

    .status-badge {
      padding: 4px 12px; border-radius: 999px; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .status-PENDING  { background: rgba(251,191,36,0.12); color: var(--warning); border: 1px solid rgba(251,191,36,0.25); }
    .status-APPROVED { background: rgba(52,211,153,0.12); color: var(--success); border: 1px solid rgba(52,211,153,0.25); }
    .status-REJECTED { background: rgba(248,113,113,0.12); color: var(--danger);  border: 1px solid rgba(248,113,113,0.25); }

    /* ---- EMPTY STATE ---- */
    .empty-state {
      text-align: center; padding: 56px 24px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
    .empty-state p { font-size: 14px; }

    /* ---- MODAL ---- */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: var(--transition);
    }
    .modal-overlay.active { opacity: 1; pointer-events: all; }
    .modal {
      background: #111827;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px;
      width: 100%; max-width: 560px;
      transform: translateY(18px) scale(0.98);
      transition: var(--transition);
      max-height: 90vh; overflow-y: auto;
    }
    .modal-overlay.active .modal { transform: translateY(0) scale(1); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .modal-title { font-size: 18px; font-weight: 700; }
    .modal-close {
      width: 32px; height: 32px; background: var(--bg-surface);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-secondary); font-size: 18px;
      transition: var(--transition);
    }
    .modal-close:hover { background: rgba(248,113,113,0.15); border-color: var(--danger); color: var(--danger); }

    /* ---- UPLOAD ZONE ---- */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius-md);
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: var(--transition);
      margin-bottom: 18px;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-glow);
    }
    .upload-zone .icon { font-size: 32px; margin-bottom: 10px; }
    .upload-zone p { font-size: 13px; color: var(--text-secondary); }
    .upload-zone input { display: none; }

    /* ---- TOAST ---- */
    #toast-container {
      position: fixed; bottom: 28px; right: 28px;
      z-index: 999; display: flex; flex-direction: column; gap: 10px;
    }
    .toast {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 18px; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 500;
      backdrop-filter: blur(16px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      animation: slideIn 0.3s ease;
      border: 1px solid;
      max-width: 340px;
    }
    .toast-success { background: rgba(52,211,153,0.15); border-color: rgba(52,211,153,0.3); color: var(--success); }
    .toast-error   { background: rgba(248,113,113,0.15); border-color: rgba(248,113,113,0.3); color: var(--danger);  }
    .toast-info    { background: rgba(79,156,249,0.15);  border-color: rgba(79,156,249,0.3);  color: var(--accent);  }

    /* ---- SEPARATOR ---- */
    .divider { height: 1px; background: var(--border); margin: 24px 0; }

    /* ---- SPINNER ---- */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    /* ---- ANIMATIONS ---- */
    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes slideIn {
      from { transform: translateX(20px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.35s ease forwards; }

    /* ---- DETAIL PANEL ---- */
    .detail-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }
    .detail-value { font-size: 14px; color: var(--text-primary); margin-bottom: 16px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 24px; }

    .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 12px; }
    .photo-item {
      aspect-ratio: 1; background: var(--bg-surface);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; position: relative; overflow: hidden; cursor: pointer;
    }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 768px) {
      header { padding: 16px 20px; }
      main { padding: 24px 16px; }
      .grid-2 { grid-template-columns: 1fr; }
      .photo-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

<body>
<div class="app-wrapper">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">🏗️</div>
      <div>
        <div class="logo-text">CraneInspect</div>
        <div class="logo-sub">Sistema de Inspeção Técnica</div>
      </div>
    </div>
    <div class="header-badge">
      <div class="badge-dot"></div>
      <span id="api-status-text">Verificando API…</span>
    </div>
  </header>

  <!-- MAIN -->
  <main>
    <div class="grid-2">

      <!-- COLUNA ESQUERDA: NOVA INSPEÇÃO -->
      <div>
        <div class="section-header">
          <div class="section-title">Nova <span>Vistoria</span></div>
        </div>
        <div class="card">
          <form id="form-inspecao">
            <div class="form-group">
              <label for="crane_tag">Tag / Chassi da Grua</label>
              <input id="crane_tag" type="text" placeholder="Ex: GRU-9092" required />
            </div>
            <div class="form-group">
              <label for="inspector_name">Nome do Inspetor Responsável</label>
              <input id="inspector_name" type="text" placeholder="Ex: Eng. Rodolfo Martins" required />
            </div>
            <div class="form-group">
              <label for="status">Status Inicial</label>
              <select id="status">
                <option value="PENDING">⏳ Pendente</option>
                <option value="APPROVED">✅ Aprovado</option>
                <option value="REJECTED">❌ Rejeitado</option>
              </select>
            </div>
            <div class="form-group">
              <label for="notes">Observações Técnicas</label>
              <textarea id="notes" placeholder="Descreva as condições de inspeção, anomalias encontradas, etc."></textarea>
            </div>
            <button id="btn-submit" type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">
              <span id="btn-submit-icon">＋</span>
              <span id="btn-submit-label">Registrar Vistoria</span>
            </button>
          </form>
        </div>
      </div>

      <!-- COLUNA DIREITA: LISTA DE INSPEÇÕES -->
      <div>
        <div class="section-header">
          <div class="section-title">Vistorias <span>Registradas</span></div>
          <button id="btn-refresh" class="btn btn-ghost" onclick="loadInspections()">
            ↻ Atualizar
          </button>
        </div>

        <div id="inspection-list-container">
          <div class="empty-state">
            <div class="icon">📋</div>
            <p>Carregando vistorias…</p>
          </div>
        </div>
      </div>

    </div>
  </main>

</div>

<!-- MODAL DE DETALHES -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-detail">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Detalhe da Vistoria</div>
      <div class="modal-close" onclick="closeModal()">✕</div>
    </div>

    <div id="modal-body"></div>

    <div class="divider"></div>

    <!-- UPLOAD DE FOTO -->
    <div>
      <div class="section-title" style="font-size:15px; margin-bottom:14px;">📸 Evidências Fotográficas</div>
      <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
        <div class="icon">☁️</div>
        <p><strong>Clique para enviar</strong> ou arraste uma imagem</p>
        <p style="font-size:11px; margin-top:6px; color:var(--text-muted)">JPEG · PNG · WebP — Upload direto para S3 privado</p>
        <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" onchange="handleFileSelect(event)" />
      </div>
      <div id="upload-status" style="font-size:13px; color:var(--text-secondary); min-height:18px;"></div>

      <div id="photo-grid-container" class="photo-grid" style="margin-top:16px;"></div>
    </div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div id="toast-container"></div>

<script>
  /* ============================================
     CRANEINSPECT — ZERO-BUILD FRONTEND ENGINE
     ============================================ */
  const API_BASE = 'http://localhost:8000';
  let activeInspectionId = null;

  /* ---- UTILITÁRIOS ---- */

  function showToast(message, type = 'info') {
    const icons = { success: '✓', error: '✗', info: 'ℹ' };
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    el.innerHTML = `<span>${icons[type]}</span><span>${message}</span>`;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => el.remove(), 3800);
  }

  function formatDate(iso) {
    return new Date(iso).toLocaleString('pt-BR', {
      day:'2-digit', month:'2-digit', year:'numeric',
      hour:'2-digit', minute:'2-digit'
    });
  }

  function setLoading(btn, loading) {
    const icon  = document.getElementById('btn-submit-icon');
    const label = document.getElementById('btn-submit-label');
    btn.disabled = loading;
    icon.innerHTML  = loading ? '<div class="spinner"></div>' : '＋';
    label.textContent = loading ? 'Registrando…' : 'Registrar Vistoria';
  }

  /* ---- STATUS DA API ---- */

  async function checkApiStatus() {
    const el = document.getElementById('api-status-text');
    try {
      const res = await fetch(`${API_BASE}/health`);
      if (res.ok) {
        const dot = document.querySelector('.badge-dot');
        dot.style.background = 'var(--success)';
        el.textContent = 'API Online';
        el.style.color = 'var(--success)';
      }
    } catch {
      el.textContent = 'API Offline';
      el.style.color = 'var(--danger)';
      document.querySelector('.badge-dot').style.background = 'var(--danger)';
    }
  }

  /* ---- CARREGAR INSPEÇÕES ---- */

  async function loadInspections() {
    const container = document.getElementById('inspection-list-container');
    container.innerHTML = `<div class="empty-state"><div class="icon" style="font-size:26px;">⏳</div><p>Carregando…</p></div>`;

    try {
      const res  = await fetch(`${API_BASE}/inspections`);
      const data = await res.json();

      if (!data.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="icon">🏗️</div>
            <p>Nenhuma vistoria registrada ainda.<br>Crie a primeira à esquerda.</p>
          </div>`;
        return;
      }

      container.innerHTML = `<div class="inspection-list" id="inspection-list"></div>`;
      const list = document.getElementById('inspection-list');

      data.reverse().forEach(ins => {
        const card = document.createElement('div');
        card.className = 'inspection-card fade-in';
        card.onclick   = () => openModal(ins);
        card.innerHTML = `
          <div class="inspection-info">
            <div class="inspection-tag">🏗️ <strong>#${ins.id}</strong> — ${ins.crane_tag}</div>
            <div class="inspection-meta">
              <span>👷 ${ins.inspector_name}</span>
              <span>📅 ${formatDate(ins.inspection_date)}</span>
              <span>📸 ${ins.photos.length} foto(s)</span>
            </div>
          </div>
          <span class="status-badge status-${ins.status}">${ins.status}</span>
        `;
        list.appendChild(card);
      });

    } catch (e) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="icon">⚠️</div>
          <p>Erro ao conectar à API.<br><small style="color:var(--text-muted)">${e.message}</small></p>
        </div>`;
    }
  }

  /* ---- CRIAR INSPEÇÃO ---- */

  document.getElementById('form-inspecao').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-submit');
    setLoading(btn, true);

    const payload = {
      crane_tag:      document.getElementById('crane_tag').value.trim(),
      inspector_name: document.getElementById('inspector_name').value.trim(),
      status:         document.getElementById('status').value,
      notes:          document.getElementById('notes').value.trim() || null,
    };

    try {
      const res = await fetch(`${API_BASE}/inspections`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload),
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      showToast(`Vistoria da grua "${payload.crane_tag}" registrada com sucesso!`, 'success');
      e.target.reset();
      loadInspections();

    } catch (err) {
      showToast(`Falha ao registrar: ${err.message}`, 'error');
    } finally {
      setLoading(btn, false);
    }
  });

  /* ---- MODAL DE DETALHE ---- */

  function openModal(ins) {
    activeInspectionId = ins.id;
    document.getElementById('modal-title').textContent = `#${ins.id} — ${ins.crane_tag}`;
    document.getElementById('upload-status').textContent = '';
    document.getElementById('photo-grid-container').innerHTML = '';

    document.getElementById('modal-body').innerHTML = `
      <div class="detail-grid">
        <div>
          <div class="detail-label">Tag / Chassi</div>
          <div class="detail-value">${ins.crane_tag}</div>
        </div>
        <div>
          <div class="detail-label">Status</div>
          <div class="detail-value"><span class="status-badge status-${ins.status}">${ins.status}</span></div>
        </div>
        <div>
          <div class="detail-label">Inspetor Responsável</div>
          <div class="detail-value">${ins.inspector_name}</div>
        </div>
        <div>
          <div class="detail-label">Data da Vistoria</div>
          <div class="detail-value">${formatDate(ins.inspection_date)}</div>
        </div>
        ${ins.notes ? `<div style="grid-column: span 2;">
          <div class="detail-label">Observações</div>
          <div class="detail-value" style="line-height:1.6">${ins.notes}</div>
        </div>` : ''}
      </div>
    `;

    /* Carrega fotos (se existirem) */
    if (ins.photos?.length) {
      const grid = document.getElementById('photo-grid-container');
      ins.photos.forEach(photo => {
        const item = document.createElement('div');
        item.className = 'photo-item';
        item.innerHTML = `<span style="font-size:26px">📷</span><div style="font-size:9px;position:absolute;bottom:4px;left:0;right:0;text-align:center;color:var(--text-muted)">ID: ${photo.id}</div>`;
        item.title = photo.s3_object_key;
        grid.appendChild(item);
      });
    }

    document.getElementById('modal-overlay').classList.add('active');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('active');
    activeInspectionId = null;
  }

  /* Fechar modal clicando fora */
  document.getElementById('modal-overlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });

  /* ---- UPLOAD DE FOTO ---- */

  async function handleFileSelect(event) {
    const file = event.target.files[0];
    if (!file || !activeInspectionId) return;

    const statusEl = document.getElementById('upload-status');
    statusEl.innerHTML = `<span style="display:flex;align-items:center;gap:8px;color:var(--accent)"><div class="spinner" style="border-top-color:var(--accent)"></div> Enviando "${file.name}" para S3…</span>`;

    const formData = new FormData();
    formData.append('file', file);
    formData.append('description', file.name);

    try {
      const res = await fetch(`${API_BASE}/inspections/${activeInspectionId}/photos`, {
        method: 'POST',
        body:   formData,
      });

      if (res.status === 500) {
        // S3 não configurado ainda — comportamento esperado sem bucket provisionado
        const body = await res.json();
        showToast(`S3 não configurado (esperado): ${body.detail}`, 'info');
        statusEl.textContent = '⚠️ S3 ainda não provisionado (aguardando Terraform)';
        return;
      }

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const photo = await res.json();

      showToast('Foto enviada e registrada com sucesso!', 'success');
      statusEl.textContent = `✓ Foto ID #${photo.id} registrada.`;

      /* Adiciona item no grid sem reload completo */
      const grid = document.getElementById('photo-grid-container');
      const item = document.createElement('div');
      item.className = 'photo-item fade-in';
      item.innerHTML = `<span style="font-size:26px">📷</span><div style="font-size:9px;position:absolute;bottom:4px;left:0;right:0;text-align:center;color:var(--text-muted)">ID: ${photo.id}</div>`;
      grid.appendChild(item);

    } catch (err) {
      showToast(`Falha no upload: ${err.message}`, 'error');
      statusEl.textContent = `✗ Erro: ${err.message}`;
    } finally {
      event.target.value = '';
    }
  }

  /* Drag & Drop */
  const zone = document.getElementById('upload-zone');
  zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', (e) => {
    e.preventDefault(); zone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) {
      const dt = new DataTransfer();
      dt.items.add(file);
      const input = document.getElementById('file-input');
      input.files = dt.files;
      handleFileSelect({ target: input });
    }
  });

  /* ---- BOOTSTRAP ---- */
  checkApiStatus();
  loadInspections();
</script>
</body>
</html>
